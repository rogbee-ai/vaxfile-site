<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VaxFile</title>
  <meta name="description" content="VaxFile — vaccination record-keeping for parents. Coming soon." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800&display=swap" rel="stylesheet">
  <style>
    *,
    *::before,
    *::after { box-sizing: border-box; }

    html, body { margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
      font-size: 16px;
      font-weight: 400;
      line-height: 1.5;
      color: #355B4F;
      background-color: #F6FBF8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    a { color: #1A5F3A; }
    a:focus-visible { outline: 2px solid #1A5F3A; outline-offset: 2px; border-radius: 2px; }

    /* Header */
    .site-header {
      width: 100%;
      height: 64px;
      background-color: #FFFFFF;
      border-bottom: 0.5px solid #E0E0E0;
      display: flex;
      align-items: center;
    }

    .header-inner {
      width: 100%;
      max-width: 720px;
      margin: 0 auto;
      padding: 0 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header-logo {
      width: 32px;
      height: 32px;
      display: block;
    }

    .wordmark {
      font-size: 17px;
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      color: #1A5F3A;
      letter-spacing: -0.5px;
    }

    /* Main */
    main {
      flex: 1;
      max-width: 720px;
      width: 100%;
      margin: 0 auto;
      padding: 0 16px 48px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .coming-soon {
      font-size: 32px;
      font-weight: 700;
      color: #1F4D3A;
      margin: 0;
      text-align: center;
      line-height: 1.2;
    }

    /* Footer */
    .site-footer {
      width: 100%;
      background-color: #FFFFFF;
      border-top: 1px solid #E0E0E0;
      padding: 24px 16px;
      margin-top: auto;
    }

    .footer-inner {
      max-width: 720px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      text-align: center;
    }

    .footer-row {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .appstore-badge { display: inline-block; }
    .appstore-badge img { height: 40px; width: auto; display: block; }

    .footer-link {
      font-size: 14px;
      font-weight: 500;
      color: #1A5F3A;
      text-decoration: none;
    }
    .footer-link:hover { text-decoration: underline; }

    .copyright {
      font-size: 12px;
      font-weight: 400;
      color: #888888;
      margin: 0;
    }

    @media (min-width: 640px) {
      .footer-row {
        flex-direction: row;
        gap: 24px;
      }
      .coming-soon { font-size: 40px; }
    }
  </style>
</head>
<script>
  const hash = window.location.hash;
  if (hash.includes('type=signup') || hash.includes('type=recovery')) {
    const type = hash.includes('type=signup') ? 'confirm' : 'reset-password';
    window.location.href = 'vaxfile://' + type + hash;
  }
</script>
</body>
<body>
  <header class="site-header">
    <div class="header-inner">
      <img src="assets/icon.png" alt="VaxFile logo" class="header-logo" width="32" height="32" />
      <span class="wordmark">VaxFile</span>
    </div>
  </header>

  <main>
    <h1 class="coming-soon">Coming soon</h1>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-row">
        <a href="https://vaxfile.app/" class="appstore-badge" aria-label="Download VaxFile on the App Store">
          <img
            src="https://developer.apple.com/assets/elements/badges/download-on-the-app-store.svg"
            alt="Download on the App Store"
          />
        </a>
        <a href="https://vaxfile.app/support" class="footer-link">Support &amp; feedback</a>
        <a href="https://vaxfile.app/privacy" class="footer-link">Privacy Policy</a>
      </div>
      <p class="copyright">© 2026 Little Handy Apps. All rights reserved.</p>
    </div>
  </footer>
</body>
</html>
