<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VaxFile</title>
  <script>
    (function() {
      var lang = navigator.language || navigator.userLanguage || 'en';
      var saved = sessionStorage.getItem('vaxfile-lang');
      var target = saved || (lang.startsWith('de') ? 'de' : lang.startsWith('nl') ? 'nl' : lang.startsWith('es') ? 'es' : 'en');
      if (!saved) sessionStorage.setItem('vaxfile-lang', target);
      window.location.replace('/' + target + '/');
    })();
  </script>
</head>
<body></body>
</html>
