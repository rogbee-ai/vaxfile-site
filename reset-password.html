<!DOCTYPE html>
<html>
<head>
  <title>VaxFile — Reset Password</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="/assets/favicon.png" type="image/png">
  <style>
    * { box-sizing: border-box; }
    body { font-family: -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #F6FBF8; padding: 24px; }
    .card { background: white; border-radius: 16px; padding: 32px 24px; width: 100%; max-width: 400px; box-shadow: 0 8px 32px rgba(0,0,0,0.08); }
    h1 { color: #1A5F3A; font-size: 26px; margin: 0 0 8px; text-align: center; }
    p { color: #5B7A70; font-size: 15px; margin: 0 0 24px; text-align: center; line-height: 1.5; }
    label { display: block; color: #2F5648; font-size: 14px; font-weight: 500; margin-bottom: 6px; }
    .input-wrapper { position: relative; margin-bottom: 16px; }
    input[type=password], input[type=text] { 
      width: 100%; 
      border: 1px solid #CFE2DA; 
      border-radius: 10px; 
      padding: 12px 44px 12px 14px; 
      font-size: 16px; 
      color: #1E2C27; 
      background: #FBFFFD; 
      outline: none;
      display: block;
    }
    input:focus { border-color: #1A5F3A; }
    .eye-btn { 
      position: absolute; 
      right: 12px; 
      top: 50%; 
      transform: translateY(-50%); 
      background: none; 
      border: none; 
      cursor: pointer; 
      padding: 4px; 
      color: #5B7A70; 
      display: flex; 
      align-items: center;
      width: 24px;
      height: 24px;
      z-index: 1;
    }
    .submit-btn { width: 100%; background: #1A5F3A; color: white; border: none; border-radius: 10px; padding: 14px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 4px; }
    .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .error { color: #C13D3D; font-size: 13px; margin-bottom: 12px; display: none; }
    .success { text-align: center; }
    .success p { color: #1A5F3A; font-size: 16px; font-weight: 500; }
    .open-app { display: inline-block; margin-top: 16px; background: #1A5F3A; color: white; padding: 14px 32px; border-radius: 10px; text-decoration: none; font-size: 16px; font-weight: bold; }
  </style>
</head>
<body>
  <div class="card">
    <h1>VaxFile</h1>

    <div id="formView" style="display:none">
      <p>Enter your new password below.</p>
      <label for="password">New password</label>
      <div class="input-wrapper">
        <input type="password" id="password" placeholder="At least 8 characters" />
        <button class="eye-btn" type="button" onclick="toggleEye('password', 'eye1')" tabindex="-1">
          <svg id="eye1" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
      <label for="confirm">Confirm password</label>
      <div class="input-wrapper">
        <input type="password" id="confirm" placeholder="Repeat your password" />
        <button class="eye-btn" type="button" onclick="toggleEye('confirm', 'eye2')" tabindex="-1">
          <svg id="eye2" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
      <div id="error" class="error"></div>
      <button type="button" class="submit-btn" id="submitBtn" onclick="handleSubmit()">Set new password</button>
    </div>

    <div id="successView" class="success" style="display:none">
      <p>✅ Password updated successfully!</p>
      <p style="color:#5B7A70; font-size:14px;">You can now log in to VaxFile with your new password.</p>
      <a class="open-app" href="vaxfile://">Open VaxFile</a>
    </div>

    <div id="errorView" style="display:none; text-align:center;">
      <p style="color:#C13D3D; font-weight:500;">This reset link has expired or is invalid.</p>
      <p style="color:#5B7A70; font-size:14px;">Please request a new password reset from the app.</p>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://urbrqgtqwifojgrctlfu.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVyYnJxZ3Rxd2lmb2pncmN0bGZ1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3NjIwNjUsImV4cCI6MjA5MjMzODA2NX0.EwbCx3IZFzCC9AiSu5xs12_IfnvbBw0Ig_2W_IpoKxU';

    let accessToken = null;

    const eyeOpen = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
    const eyeClosed = `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>`;

    function toggleEye(inputId, svgId) {
      const input = document.getElementById(inputId);
      const svg = document.getElementById(svgId);
      if (input.type === 'password') {
        input.type = 'text';
        svg.innerHTML = eyeClosed;
      } else {
        input.type = 'password';
        svg.innerHTML = eyeOpen;
      }
    }

    function init() {
      const hash = window.location.hash.substring(1);
      const search = window.location.search.substring(1);
      const paramString = hash || search;
      const params = new URLSearchParams(paramString);
      accessToken = params.get('access_token');
      const type = params.get('type');
      const errorCode = params.get('error_code');

      if (errorCode || !accessToken || type !== 'recovery') {
        document.getElementById('formView').style.display = 'none';
        document.getElementById('errorView').style.display = 'block';
        return;
      }

      document.getElementById('formView').style.display = 'block';
    }

    function showError(msg) {
      const el = document.getElementById('error');
      el.textContent = msg;
      el.style.display = 'block';
    }

    async function handleSubmit() {
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm').value;
      const btn = document.getElementById('submitBtn');

      document.getElementById('error').style.display = 'none';

      if (!password || password.length < 8) { showError('Password must be at least 8 characters.'); return; }
      if (!/\d/.test(password)) { showError('Password must contain at least one number.'); return; }
      if (!/[^A-Za-z0-9]/.test(password)) { showError('Password must contain at least one special character.'); return; }
      if (password !== confirm) { showError('Passwords do not match.'); return; }

      btn.disabled = true;
      btn.textContent = 'Updating...';

      try {
        const updateRes = await fetch(`${SUPABASE_URL}/auth/v1/user`, {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
            'apikey': SUPABASE_ANON_KEY,
            'Authorization': `Bearer ${accessToken}`,
          },
          body: JSON.stringify({ password }),
        });

        if (!updateRes.ok) {
          const err = await updateRes.json();
          showError(err.message || 'Something went wrong. Please try again.');
          btn.disabled = false;
          btn.textContent = 'Set new password';
          return;
        }

        document.getElementById('formView').style.display = 'none';
        document.getElementById('successView').style.display = 'block';

      } catch (e) {
        showError('Something went wrong. Please try again.');
        btn.disabled = false;
        btn.textContent = 'Set new password';
      }
    }

    init();
  </script>
</body>
</html>
